# Sample Jilin University DrCOM configuration for drcom on OpenWrt
# Replace username / password / mac / host_ip with your own campus values.
# If the campus binds a physical MAC, use that bound MAC here.
username='your_username'
password='your_password'
server='10.100.61.3'
PRIMARY_DNS='10.10.10.10'
SECONDARY_DNS='8.8.8.8'
host_name='OpenWrt'
host_os='Windows 10'
mac=0xB025AA851014
host_ip='172.18.0.100'
dhcp_server='0.0.0.0'
CONTROLCHECKSTATUS='\x20'
ADAPTERNUM='\x05'
IPDOG='\x01'
profile='jlu-modern'
keepalive1_mod=True
startup_delay_seconds=60

# Optional compatibility keys:
# Try this on older JLU gateways that reject jlu-modern:
# profile='jlu-legacy'
# If you want manual AUTH_VERSION / KEEP_ALIVE_VERSION / ror_version / jlu_mode overrides,
# either remove profile or write the manual keys below profile.
# AUTH_VERSION='\x68\x00'
# KEEP_ALIVE_VERSION='\xdc\x02'
# ror_version=True
# jlu_mode=False
# bind_ip='0.0.0.0'
# log='/tmp/drcom.log'
# eternal=1
# Disable boot delay after graceful logout is proven stable:
# startup_delay_seconds=0
# mac also supports 'B0:25:AA:85:10:14'
